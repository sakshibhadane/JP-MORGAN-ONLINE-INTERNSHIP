name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Run validation script
      run: |
        if [ -f ./validate.sh ]; then
          chmod +x ./validate.sh
          ./validate.sh
        else
          echo "No validation script found, build passes by default"
        fi
